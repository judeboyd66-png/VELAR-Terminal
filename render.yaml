services:
  - type: web
    name: velar-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: true
